<!DOCTYPE html>
<html>
  <head>
  <meta charset="UTF-8">
  <title>Cookie Clicker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <button id="multiplier">Buy Nebula - Cost: </button>
    <button id="proto">Buy Protostar - Cost: </button>
    <button id="tauri">Initiate T-Tauri Phase - Cost: </button>
    <button id="LM">Buy Low Mass Star - Cost: </button>
    <button id="HM">Buy High Mass Star - Cost: </button>
    <button id="auto">Buy Autoclicker - Cost: </button>
  </div>
  <div class = "clicker">
    <h1 id="cookies">Atoms: 0</h1>
    <button id="increase">Split Atom(s)</button>
  </div>
  <div class="statistics">
    <h1>||Upgrade Statistics||</h1>
    <h1 id="M">Multiplier: 0</h1>
    <h1 id="A">Autoclicks: 0</h1>
  </div>
  <script src="script.js"></script>
</body>
</html>
